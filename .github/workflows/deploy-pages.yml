name: Deploy site (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Not: pnpm sürümü package.json'daki "packageManager" alanından okunur.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps (sadece web + bağımlılıkları)
        run: pnpm install --filter "@studfy/web..." --no-frozen-lockfile

      - name: Build web (static export)
        run: pnpm --filter @studfy/web build
        env:
          PAGES_BASE_PATH: /Studyfy
          # AI proxy (Cloudflare Worker) adresi. Repo > Settings > Variables > AI_PROXY_URL
          # ayarlanırsa site anahtarsız "dahili AI" ile çalışır; boşsa kullanıcı kendi
          # ücretsiz anahtarını girer (BYOK). Bkz. infra/ai-proxy/README.md
          NEXT_PUBLIC_AI_PROXY: ${{ vars.AI_PROXY_URL }}

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

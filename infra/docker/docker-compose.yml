# Studfy — yerel geliştirme altyapısı.
# Kullanım: docker compose -f infra/docker/docker-compose.yml up -d
name: studfy

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: studfy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-studfy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-studfy_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-studfy}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-studfy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: studfy-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: studfy-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage

  minio:
    image: minio/minio:latest
    container_name: studfy-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: studfy-litellm
    restart: unless-stopped
    env_file: ../../.env
    ports:
      - "4000:4000"
    depends_on:
      - redis

volumes:
  pgdata:
  redisdata:
  qdrantdata:
  miniodata:
